services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tailorstack
      POSTGRES_PASSWORD: tailorstack
      POSTGRES_DB: tailorstack
    ports:
      - "15432:5432"
    volumes:
      - tailorstack-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tailorstack -d tailorstack"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tailorstack
      MINIO_ROOT_PASSWORD: tailorstack-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tailorstack-minio:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 tailorstack tailorstack-dev;
      mc mb --ignore-existing local/tailorstack-local;
      "

volumes:
  tailorstack-postgres:
  tailorstack-minio:
